<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entrar — Sítio Recanto dos Ipês</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          forest: { DEFAULT:'#261C15', light:'#3D2B1F', dark:'#150F0A' },
          gold:   { DEFAULT:'#C5D86D', dark:'#9BAB52' },
          beige:  { DEFAULT:'#F7F7F2', dark:'#E4E6C3' },
          stone:  { DEFAULT:'#6B6B6B', light:'#9A9A9A' },
        },
        fontFamily: { serif:['Merriweather','serif'], sans:['Lato','sans-serif'] },
      }}
    }
  </script>
  <style>
    body { font-family:'Lato',sans-serif; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen bg-beige flex items-center justify-center px-4 py-12">

  <div class="w-full max-w-md">

    <!-- Logo / brand -->
    <div class="text-center mb-8">
      <a href="/" class="inline-block">
        <p class="font-serif text-2xl font-bold text-forest">Recanto dos Ipês</p>
        <p class="text-stone text-sm mt-1">Jaboticatubas · MG</p>
      </a>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-lg p-8">

      <!-- Title -->
      <h1 class="font-serif text-xl font-bold text-forest text-center mb-2">Acessar minha conta</h1>
      <p class="text-stone text-sm text-center mb-8">Gerencie suas reservas e estadias</p>

      <!-- Tabs -->
      <div class="flex rounded-xl bg-beige p-1 mb-6">
        <button id="tab-email" onclick="setTab('email')"
          class="flex-1 py-2 rounded-lg text-sm font-semibold transition-all bg-white text-forest shadow-sm">
          Por e-mail
        </button>
        <button id="tab-google" onclick="setTab('google')"
          class="flex-1 py-2 rounded-lg text-sm font-semibold transition-all text-stone">
          Google
        </button>
      </div>

      <!-- Email OTP panel -->
      <div id="panel-email">

        <!-- Step 1: email input -->
        <div id="step-email">
          <label class="block text-sm font-semibold text-forest mb-2">Seu e-mail</label>
          <input id="input-email" type="email" placeholder="voce@email.com"
            class="w-full border-2 border-beige-dark rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gold transition-colors"
            autocomplete="email"/>
          <p id="email-error" class="text-red-500 text-xs mt-1 hidden"></p>
          <button onclick="sendCode()"
            class="mt-4 w-full bg-forest hover:bg-forest-light text-white font-bold py-3.5 rounded-xl transition-colors text-sm">
            Receber código
          </button>
          <p class="text-xs text-stone text-center mt-4">
            Enviaremos um código de 6 dígitos para o seu e-mail.
          </p>
        </div>

        <!-- Step 2: code input -->
        <div id="step-code" class="hidden">
          <p class="text-sm text-stone mb-4">Código enviado para <strong id="code-sent-to" class="text-forest"></strong></p>
          <label class="block text-sm font-semibold text-forest mb-2">Código de verificação</label>
          <input id="input-code" type="text" inputmode="numeric" maxlength="6" placeholder="_ _ _ _ _ _"
            class="w-full border-2 border-beige-dark rounded-xl px-4 py-3 text-2xl font-bold tracking-widest text-center focus:outline-none focus:border-gold transition-colors"
            autocomplete="one-time-code"/>
          <p id="code-error" class="text-red-500 text-xs mt-1 hidden"></p>
          <button onclick="verifyCode()"
            class="mt-4 w-full bg-forest hover:bg-forest-light text-white font-bold py-3.5 rounded-xl transition-colors text-sm">
            Verificar e entrar
          </button>
          <button onclick="resendCode()"
            class="mt-3 w-full text-stone hover:text-forest text-sm transition-colors py-1" id="resend-btn">
            Reenviar código
          </button>
          <button onclick="backToEmail()" class="mt-2 w-full text-stone hover:text-forest text-xs transition-colors">
            ← Usar outro e-mail
          </button>
        </div>

        <!-- Loading overlay -->
        <div id="email-loading" class="hidden flex-col items-center py-4">
          <svg class="spin w-8 h-8 text-gold mb-2" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          <p class="text-stone text-sm" id="loading-msg">Enviando…</p>
        </div>

      </div>

      <!-- Google panel -->
      <div id="panel-google" class="hidden">
        <a href="/api/auth/google"
          class="flex items-center justify-center gap-3 w-full border-2 border-beige-dark rounded-xl py-3.5 hover:border-forest transition-colors text-sm font-semibold text-forest">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continuar com Google
        </a>
        <p class="text-xs text-stone text-center mt-4">
          Sua conta Google será usada para acessar suas reservas.
        </p>
      </div>

      <!-- URL error message -->
      <div id="url-error" class="hidden mt-4 bg-red-50 border border-red-200 rounded-xl p-3 text-red-700 text-sm text-center"></div>

    </div>

    <!-- Back link -->
    <p class="text-center mt-6 text-sm text-stone">
      <a href="/" class="hover:text-forest transition-colors">← Voltar ao site</a>
    </p>

  </div>

<script src="/js/login.js"></script>
</body>
</html>
