<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sítio Recanto dos Ipês — App Icon
  Design: Official SRI brand mark (sri-mark-gold.svg) on deep forest background
  with subtle glass disc glow. Mark is landscape (3779×2645) — detail compresses
  at small sizes by design decision; silhouette shape reinforces brand identity.
  Brand colors: Forest #1C1208 · Gold #C5D86D · Green #2B7929
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 512 512" width="512" height="512">

  <defs>

    <!-- Forest dark background -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1F1409"/>
      <stop offset="55%"  stop-color="#1C1208"/>
      <stop offset="100%" stop-color="#110B03"/>
    </linearGradient>

    <!-- Nature green ambient — top-left -->
    <radialGradient id="gg" cx="70" cy="65" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2B7929" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#2B7929" stop-opacity="0"/>
    </radialGradient>

    <!-- Gold warmth ambient — bottom-center -->
    <radialGradient id="ga" cx="256" cy="480" r="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C5D86D" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C5D86D" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle centre glow behind the mark (glass disc, dimmed — acts as a light source) -->
    <radialGradient id="glow" cx="256" cy="256" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C5D86D" stop-opacity="0.07"/>
      <stop offset="60%"  stop-color="#C5D86D" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#C5D86D" stop-opacity="0"/>
    </radialGradient>

    <!-- Edge vignette — darkens corners to focus eye on the mark -->
    <radialGradient id="vg" cx="256" cy="256" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="60%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>

  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#gg)"/>
  <rect width="512" height="512" fill="url(#ga)"/>

  <!-- ── Subtle gold glow zone behind the mark ── -->
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- ── Brand mark — SRI gold variant, centered, fills 88% of icon width ──
       Mark ratio: 3779 ÷ 2645 = 1.4286 (landscape)
       Width = 450px → Height = 315px → centered at (31, 98.5)
       At small sizes the silhouette remains recognisable as the brand shape.
  ── -->
  <image href="/brand/sri-mark-gold.svg"
         x="31" y="98"
         width="450" height="315"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- ── Edge vignette (keeps attention on the mark) ── -->
  <rect width="512" height="512" fill="url(#vg)"/>

</svg>
