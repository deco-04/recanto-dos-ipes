<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minhas Reservas — Sítio Recanto dos Ipês</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          forest: { DEFAULT:'#261C15', light:'#3D2B1F' },
          gold:   { DEFAULT:'#C5D86D', dark:'#9BAB52' },
          beige:  { DEFAULT:'#F7F7F2', dark:'#E4E6C3' },
          stone:  { DEFAULT:'#6B6B6B', light:'#9A9A9A' },
        },
        fontFamily: { serif:['Merriweather','serif'], sans:['Lato','sans-serif'] },
      }}
    }
  </script>
  <style>
    body { font-family:'Lato',sans-serif; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen bg-beige">

  <!-- Navbar -->
  <nav class="bg-forest px-6 py-4">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <a href="/" class="font-serif text-white font-bold text-lg">Recanto dos Ipês</a>
      <div class="flex items-center gap-4">
        <span id="nav-user" class="text-white/70 text-sm hidden"></span>
        <button onclick="logout()"
          class="text-white/70 hover:text-white text-sm transition-colors border border-white/20 px-3 py-1.5 rounded-lg hover:border-white/50">
          Sair
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-4 py-10" id="dashboard-content">

    <!-- Loading -->
    <div id="loading-state" class="flex flex-col items-center justify-center py-24">
      <svg class="spin w-10 h-10 text-gold mb-3" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
      <p class="text-stone text-sm">Carregando suas reservas…</p>
    </div>

    <!-- Main content -->
    <div id="main-content" class="hidden space-y-10">

      <div>
        <h1 class="font-serif text-2xl md:text-3xl font-bold text-forest">Minhas reservas</h1>
        <p class="text-stone text-sm mt-1" id="user-greeting"></p>
      </div>

      <!-- Current stay -->
      <div id="current-section" class="hidden">
        <h2 class="text-xs font-bold uppercase tracking-widest text-gold-dark mb-3">Estadia atual</h2>
        <div id="current-card" class="bg-forest text-white rounded-2xl p-6 shadow-lg"></div>
      </div>

      <!-- Upcoming stays -->
      <div id="upcoming-section" class="hidden">
        <h2 class="text-xs font-bold uppercase tracking-widest text-stone mb-3">Próximas estadias</h2>
        <div id="upcoming-card" class="bg-white rounded-2xl p-6 shadow-sm border border-beige-dark"></div>
      </div>

      <!-- No upcoming message -->
      <div id="no-upcoming" class="hidden bg-white rounded-2xl p-8 text-center border border-beige-dark">
        <p class="text-stone text-sm mb-4">Nenhuma reserva futura encontrada.</p>
        <a href="/#reservas" class="bg-forest text-white font-semibold px-5 py-2.5 rounded-xl text-sm hover:bg-forest-light transition-colors">
          Reservar agora
        </a>
      </div>

      <!-- Past stays -->
      <div>
        <h2 class="text-xs font-bold uppercase tracking-widest text-stone mb-3">Histórico de estadias</h2>
        <div id="past-list" class="space-y-3"></div>
        <p id="no-past" class="hidden text-stone text-sm text-center py-6">Nenhuma estadia anterior.</p>
      </div>

    </div>
  </div>

<script src="/js/dashboard.js"></script>
</body>
</html>
