<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Sítio Recanto dos Ipês — Favicon
    Design: Miniature ipê amarelo flower on deep forest background.
    Matches the app icon identity at favicon scale (16–32px).
    Brand colors: Forest #1C1208 · Gold #C5D86D · Green #2B7929
  -->
  <defs>

    <!-- Forest dark background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1F1409"/>
      <stop offset="100%" stop-color="#130C04"/>
    </linearGradient>

    <!-- Nature green ambient (top-left) -->
    <radialGradient id="gg" cx="4" cy="4" r="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2B7929" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#2B7929" stop-opacity="0"/>
    </radialGradient>

    <!-- Gold warmth (bottom) -->
    <radialGradient id="ga" cx="16" cy="30" r="15" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C5D86D" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#C5D86D" stop-opacity="0"/>
    </radialGradient>

    <!-- Glass disc: faint frosted tint behind flower -->
    <radialGradient id="gf" cx="12" cy="10" r="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </radialGradient>

    <!--
      Petal fill: radial from center outward.
      Deep olive at base (near center) → brand gold → bright tip highlight.
      Mimics the app icon petal gradient at this scale.
    -->
    <radialGradient id="pf" cx="16" cy="16" r="13" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4A6818"/>
      <stop offset="40%"  stop-color="#A8C050"/>
      <stop offset="72%"  stop-color="#C5D86D"/>
      <stop offset="100%" stop-color="#E8FA90"/>
    </radialGradient>

  </defs>

  <!-- ── Background ── -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect width="32" height="32" rx="7" fill="url(#gg)"/>
  <rect width="32" height="32" rx="7" fill="url(#ga)"/>

  <!-- ── Glass disc (faint tone that separates flower from bg) ── -->
  <circle cx="16" cy="16" r="11" fill="url(#gf)"/>
  <circle cx="16" cy="16" r="11" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
  <!-- Top-left specular (tiny but gives it the glass "spark") -->
  <ellipse cx="11.5" cy="10.5" rx="3.8" ry="2" fill="rgba(255,255,255,0.38)"
    transform="rotate(-38 11.5 10.5)"/>

  <!-- ── Ipê flower — 5 petals ── -->
  <!--
    Petal geometry (32×32 space):
      Center: (16, 16)
      Petal center: (16, 10)  →  6px above icon center
      rx=2.3  ry=5.5          →  tip at y=4.5 (11.5px from center)
      5 petals × 72° rotation around (16, 16)
  -->
  <ellipse cx="16" cy="10" rx="2.3" ry="5.5" fill="url(#pf)"/>
  <ellipse cx="16" cy="10" rx="2.3" ry="5.5" fill="url(#pf)" transform="rotate(72  16 16)"/>
  <ellipse cx="16" cy="10" rx="2.3" ry="5.5" fill="url(#pf)" transform="rotate(144 16 16)"/>
  <ellipse cx="16" cy="10" rx="2.3" ry="5.5" fill="url(#pf)" transform="rotate(216 16 16)"/>
  <ellipse cx="16" cy="10" rx="2.3" ry="5.5" fill="url(#pf)" transform="rotate(288 16 16)"/>

  <!-- ── Flower centre ── -->
  <!-- Gold ring -->
  <circle cx="16" cy="16" r="2.8" fill="#C5D86D"/>
  <!-- Dark calyx -->
  <circle cx="16" cy="16" r="1.9" fill="#1C1208"/>
  <!-- Stamen dot -->
  <circle cx="16" cy="16" r="0.8" fill="#DFF080"/>

</svg>
