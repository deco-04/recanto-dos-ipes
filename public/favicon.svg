<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 32 32" width="32" height="32">
  <!--
    Sítio Recanto dos Ipês — Favicon
    Official SRI brand mark (gold) on deep forest background.
    Mark is landscape (3779×2645) — detail compresses at 16–32px by design;
    the silhouette shape and gold-on-dark identity reinforce the brand.
    Brand colors: Forest #1C1208 · Gold #C5D86D · Green #2B7929
  -->
  <defs>

    <!-- Forest dark gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1F1409"/>
      <stop offset="100%" stop-color="#110B03"/>
    </linearGradient>

    <!-- Green ambient — top-left -->
    <radialGradient id="gg" cx="3" cy="3" r="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2B7929" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2B7929" stop-opacity="0"/>
    </radialGradient>

    <!-- Gold warmth — bottom -->
    <radialGradient id="ga" cx="16" cy="30" r="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C5D86D" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#C5D86D" stop-opacity="0"/>
    </radialGradient>

    <!-- Edge vignette -->
    <radialGradient id="vg" cx="16" cy="16" r="17" gradientUnits="userSpaceOnUse">
      <stop offset="58%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.50)"/>
    </radialGradient>

  </defs>

  <!-- ── Background ── -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect width="32" height="32" rx="7" fill="url(#gg)"/>
  <rect width="32" height="32" rx="7" fill="url(#ga)"/>

  <!-- ── Brand mark — gold, centred, fills 84% of favicon width ──
       Mark ratio: 3779 ÷ 2645 = 1.4286
       Width = 27px → Height = 18.9px → x=2.5, y=6.5
  ── -->
  <image href="/brand/sri-mark-gold.svg"
         x="2.5" y="6.5"
         width="27" height="18.9"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- ── Edge vignette ── -->
  <rect width="32" height="32" rx="7" fill="url(#vg)"/>

</svg>
